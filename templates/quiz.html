{% extends "base.html" %}

{% block content %}
<div class="quiz-container">
    <div class="quiz-header">
        <div class="progress-info">Question <span id="qnum">1</span>/20</div>
        <div class="score-display">Score: <span id="score">0</span>/20</div>
    </div>
    
    <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
    </div>
    
    <div class="question-card">
        <h2 id="question"></h2>
        
        <div id="choices" class="choices-container"></div>
        
        <div id="feedback" class="feedback"></div>
        
        <div class="button-group">
            <button id="btn" class="btn btn-primary" onclick="submit()">Submit Answer</button>
        </div>
    </div>
</div>

<script>
let current = null;

function load() {
    fetch('/question').then(r => r.json()).then(data => {
        if (data.done) {
            window.location.href = '/results';
            return;
        }
        
        current = data;
        document.getElementById('qnum').textContent = data.num;
        document.getElementById('score').textContent = data.score;
        document.getElementById('progress-fill').style.width = (data.num / data.total * 100) + '%';
        document.getElementById('question').textContent = data.question;
        document.getElementById('feedback').innerHTML = '';
        document.getElementById('btn').textContent = 'Submit Answer';
        document.getElementById('btn').onclick = submit;
        
        let html = '';
        data.choices.forEach((c, i) => {
            html += `<div class="choice"><input type="radio" id="c${i}" name="a" value="${c}"><label for="c${i}">${c}</label></div>`;
        });
        document.getElementById('choices').innerHTML = html;
    }).catch(e => {
        document.getElementById('question').textContent = 'Error loading question: ' + e.message;
    });
}

function submit() {
    let selected = document.querySelector('input[name="a"]:checked');
    if (!selected) {
        alert('Pick an answer!');
        return;
    }
    
    fetch('/answer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({answer: selected.value})
    }).then(r => r.json()).then(data => {
        let fb = document.getElementById('feedback');
        if (data.correct) {
            fb.innerHTML = '✓ Correct!';
            fb.className = 'feedback feedback-correct';
        } else {
            fb.innerHTML = `✗ Wrong!<br>Right answer: ${data.answer}`;
            fb.className = 'feedback feedback-incorrect';
        }
        
        document.getElementById('score').textContent = data.new_score;
        document.querySelectorAll('input[name="a"]').forEach(r => r.disabled = true);
        document.getElementById('btn').textContent = 'Next Question';
        document.getElementById('btn').onclick = load;
    }).catch(e => {
        alert('Error: ' + e.message);
    });
}

load();
</script>
{% endblock %}
